<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>匿名表白墙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 600px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(15px);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      padding: 30px 28px;
    }
    h1 {
      text-align: center;
      font-weight: 500;
      color: #4a6fa5;
      margin-bottom: 20px;
    }
    h1::before, h1::after { content: "💌"; font-size: 1.5rem; }
    #messages {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      height: 320px;
      overflow-y: auto;
      margin-bottom: 20px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: #d4dce6; border-radius: 10px; }
    .msg {
      padding: 12px 14px;
      margin-bottom: 10px;
      background: #f8faff;
      border-radius: 12px;
      border-left: 4px solid #7aa2d6;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg .content { color: #2c3e50; line-height: 1.6; }
    .msg .time { font-size: 0.75rem; color: #95a5a6; text-align: right; }
    textarea {
      width: 100%;
      height: 70px;
      padding: 14px 16px;
      border: 2px solid #e0e7f0;
      border-radius: 16px;
      resize: none;
      outline: none;
      transition: border 0.3s;
    }
    textarea:focus { border-color: #7aa2d6; }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #7aa2d6, #5d8ac8);
      color: white;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.3s;
      margin-top: 12px;
    }
    button:hover { background: linear-gradient(135deg, #5d8ac8, #4a6fa5); }
    #status { margin-top: 10px; color: #4a6fa5; text-align: center; }
    #error-detail { background: #fff0f0; color: #c92a2a; padding: 12px; margin-top: 12px; border-radius: 12px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>匿名表白墙</h1>
    <div id="messages">加载中...</div>
    <textarea id="input" placeholder="写下你想说的话..." maxlength="500"></textarea>
    <button onclick="submit()">🌿 匿名提交</button>
    <p id="status"></p>
    <div id="error-detail"></div>
  </div>

  <script>
    // ========== 你的分段密钥（保持不变） ==========
    const P1 = 'Z2hwX00xRFFWTkdEWFZmYTFJQkty';
    const P2 = 'OTZGdVlJRzlyQmx5czNxQXMzWQ==';
    // ===========================================
    const TOKEN = atob(P1 + P2);
    const REPO = 'LiveTF/love-wall';
    const PATH = 'msg.json';
    let countdownInterval = null;

    // ✅ 100% 可靠的 UTF-8 转 Base64（逐字节拼接，避免溢出）
    function utf8ToBase64(str) {
      const bytes = new TextEncoder().encode(str);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    function clearCountdown() {
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
    }

    function startCountdown(seconds) {
      clearCountdown();
      const statusEl = document.getElementById('status');
      let remaining = seconds;
      statusEl.innerText = `✅ 提交成功！页面将在 ${remaining} 秒后自动刷新...`;
      countdownInterval = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearCountdown();
          statusEl.innerText = '正在刷新...';
          location.reload(true);
        } else {
          statusEl.innerText = `✅ 提交成功！页面将在 ${remaining} 秒后自动刷新...`;
        }
      }, 1000);
    }

    async function load() {
      const msgsEl = document.getElementById('messages');
      try {
        const res = await fetch(`${PATH}?t=${Date.now()}_${Math.random()}`);
        if (!res.ok) throw new Error('加载失败');
        const data = await res.json();
        msgsEl.innerHTML = data.map(m =>
          `<div class="msg"><div class="content">${escapeHtml(m.text||'')}</div><div class="time">${new Date(m.time).toLocaleString()}</div></div>`
        ).join('') || '<div style="text-align:center;color:#aaa;padding:30px;">✨ 还没有留言，快来写下第一条吧 ~</div>';
      } catch (e) {
        msgsEl.innerHTML = '<div style="text-align:center;color:#e74c3c;padding:30px;">加载失败，请刷新页面</div>';
      }
    }

    async function submit() {
      const text = document.getElementById('input').value.trim();
      const status = document.getElementById('status');
      const errBox = document.getElementById('error-detail');
      if (!text) return;

      clearCountdown();
      status.innerText = '提交中...';
      errBox.style.display = 'none';

      try {
        const getRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, {
          headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!getRes.ok) throw new Error(await getRes.text());
        const file = await getRes.json();
        const sha = file.sha;
        let arr = [];
        try { arr = JSON.parse(atob(file.content)); } catch {}

        arr.push({
          id: Date.now().toString(36) + Math.random().toString(36).slice(2,8),
          text: text.slice(0,500),
          time: new Date().toISOString()
        });
        if (arr.length > 500) arr = arr.slice(-500);

        const jsonStr = JSON.stringify(arr, null, 2);
        const content = utf8ToBase64(jsonStr);   // ✅ 关键修复

        const putRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, {
          method: 'PUT',
          headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' },
          body: JSON.stringify({ message: 'add message', content: content, sha: sha })
        });

        if (putRes.ok) {
          document.getElementById('input').value = '';
          startCountdown(60);
        } else if (putRes.status === 409) {
          status.innerText = '⚠️ 有人同时提交，再点一次';
        } else {
          throw new Error(await putRes.text());
        }
      } catch (e) {
        clearCountdown();
        status.innerText = '❌ 提交失败';
        errBox.style.display = 'block';
        errBox.innerText = e.message;
      }
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
