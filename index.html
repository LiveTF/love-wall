<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>匿名表白墙</title>
  <style>
    body{max-width:600px;margin:20px auto;font-family:sans-serif;}
    #messages{border:1px solid #ccc;padding:10px;height:300px;overflow-y:auto;margin-bottom:15px;}
    .msg{border-bottom:1px solid #eee;padding:5px 0;}
    .time{color:#999;font-size:0.8em;}
    textarea{width:100%;height:60px;}
    button{margin-top:5px;}
  </style>
</head>
<body>
  <h1>匿名表白墙</h1>
  <div id="messages">加载中...</div>
  <textarea id="input" placeholder="说点什么（最多500字）" maxlength="500"></textarea><br>
  <button onclick="submit()">匿名提交</button>
  <p id="status"></p>

  <script>
    // !!! 把下面这一行替换成你刚复制的 PAT !!!
    const TOKEN = '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';
    const REPO = 'LiveTF/love-wall';   // 改成你的用户名和仓库名
    const PATH = 'msg.json';

    async function load() {
      try {
        const res = await fetch(`msg.json?t=${Date.now()}`);
        const data = await res.json();
        const msgs = document.getElementById('messages');
        msgs.innerHTML = data.map(m =>
          `<div class="msg"><div>${escapeHtml(m.text)}</div><div class="time">${new Date(m.time).toLocaleString()}</div></div>`
        ).join('') || '还没有留言，抢沙发～';
      } catch (e) {
        document.getElementById('messages').innerText = '加载失败';
      }
    }

    async function submit() {
      const text = document.getElementById('input').value.trim();
      const status = document.getElementById('status');
      if (!text) return;
      status.innerText = '提交中...';

      try {
        // 1. 先获取当前 msg.json
        const getRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, {
          headers: {
            'Authorization': `token ${TOKEN}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });
        if (!getRes.ok) throw new Error('读取失败');
        const file = await getRes.json();
        const sha = file.sha;
        let arr = [];
        try { arr = JSON.parse(atob(file.content)); } catch {}

        // 2. 添加新留言
        arr.push({
          id: Date.now().toString(36) + Math.random().toString(36).slice(2),
          text: text.slice(0, 500),
          time: new Date().toISOString()
        });
        if (arr.length > 500) arr = arr.slice(-500);

        // 3. 更新文件
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(arr, null, 2))));
        const putRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${TOKEN}`,
            'Accept': 'application/vnd.github.v3+json'
          },
          body: JSON.stringify({
            message: 'add message',
            content: content,
            sha: sha
          })
        });

        if (putRes.ok) {
          status.innerText = '提交成功！稍后刷新可见。';
          document.getElementById('input').value = '';
          setTimeout(load, 30000);
        } else if (putRes.status === 409) {
          status.innerText = '有人同时提交，请再点一次';
        } else {
          status.innerText = '提交失败';
        }
      } catch (e) {
        status.innerText = '网络错误或钥匙不对';
      }
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
