name: 处理表白提交
on:
  repository_dispatch:
    types: [wall_submit]

jobs:
  add-message:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 获取访客提交内容
        id: get_payload
        run: |
          echo "TEXT=${{ github.event.client_payload.content }}" >> $GITHUB_ENV

      - name: 更新表白文件
        run: |
          import json, datetime
          with open("msg.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          new_msg = {
              "text": "${{ env.TEXT }}",
              "time": datetime.datetime.now().strftime("%Y-%m-%d %H:%M")
          }
          data.append(new_msg)
          with open("msg.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
        shell: python

      - name: 设置Git用户
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: 提交更新
        env:
          TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git add msg.json
          git commit -m "新增表白留言"
          git push https://${TOKEN}@github.com/${{ github.repository }}.git main
